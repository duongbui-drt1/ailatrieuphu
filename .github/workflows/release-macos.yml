name: Release macOS

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      target:
        description: App role to build
        required: true
        default: all
        type: choice
        options:
          - all
          - host
          - client
          - viewer
  push:
    tags:
      - "macos_v*"

jobs:
  init-release:
    name: Prepare macOS GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/macos_v')
    steps:
      - name: Create release shell
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --title "Ai La Trieu Phu macOS ${GITHUB_REF_NAME}" \
              --notes "macOS 14 unsigned installer selector and role-specific pkg builds for Apple Silicon (arm64) and Intel. Right-click and Open may be required on first launch."

  build:
    name: macOS ${{ matrix.arch }} pkg
    needs: init-release
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.init-release.result == 'success') }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: intel
            runner: macos-15-intel
    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS package
        shell: bash
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ -z "$TARGET" ]; then TARGET="all"; fi
          sw_vers
          uname -m
          echo "MACOSX_DEPLOYMENT_TARGET=${MACOSX_DEPLOYMENT_TARGET}"
          VERSION="${GITHUB_REF_NAME#macos_v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then VERSION="1.0.0"; fi
          bash packaging/build_macos.sh "$TARGET" "$VERSION"

      - name: Pack macOS role pkgs and installer
        shell: bash
        run: |
          mkdir -p release
          rm -f dist/*.pkg
          VERSION="${GITHUB_REF_NAME#macos_v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then VERSION="1.0.0"; fi

          TARGET="${{ github.event.inputs.target }}"
          if [ -z "$TARGET" ]; then TARGET="all"; fi

          pack_role() {
            role="$1"
            output="$2"
            display="$3"
            if [ "$TARGET" != "all" ] && [ "$TARGET" != "$role" ]; then
              return 0
            fi

            app="dist/${output}.app"
            if [ ! -d "$app" ]; then
              echo "Missing macOS app bundle: $app"
              return 1
            fi

            pkgroot="$(mktemp -d)"
            mkdir -p "$pkgroot/Applications"
            cp -R "$app" "$pkgroot/Applications/${display}.app"
            pkg="release/AiLaTrieuPhu-macOS-${role}-${{ matrix.arch }}-macos14.pkg"
            pkgbuild \
              --root "$pkgroot" \
              --identifier "vn.duli.ailatrieuphu.${role}" \
              --version "$VERSION" \
              --install-location "/" \
              "$pkg"
            rm -rf "$pkgroot"
          }

          pack_role "host" "AiLaTrieuPhu-Host" "Ai Là Triệu Phú (Host)"
          pack_role "client" "AiLaTrieuPhu-Client" "Ai Là Triệu Phú (Người Chơi)"
          pack_role "viewer" "AiLaTrieuPhu-Viewer" "Ai Là Triệu Phú (Khán Giả)"

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            installer_dir="release/installer-macos"
            mkdir -p "$installer_dir"
            sed \
              -e "s#__REPO__#${{ github.repository }}#g" \
              -e "s#__TAG__#${GITHUB_REF_NAME}#g" \
              packaging/installers/macos/Install-AiLaTrieuPhu.command.in > "$installer_dir/Install-AiLaTrieuPhu.command"
            chmod +x "$installer_dir/Install-AiLaTrieuPhu.command"
            (cd "$installer_dir" && zip -r "../AiLaTrieuPhu-macOS-Installer-${GITHUB_REF_NAME}.zip" .)
          fi

          found=0
          for item in release/*; do
            if [ -f "$item" ]; then
              found=1
              ls -lh "$item"
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "No release files were created."
            exit 1
          fi

      - name: Publish macOS files to release
        if: startsWith(github.ref, 'refs/tags/macos_v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          found=0
          for asset in release/*; do
            if [ ! -f "$asset" ]; then
              continue
            fi
            found=1
            ls -lh "$asset"
            gh release upload "${GITHUB_REF_NAME}" "$asset" --clobber
          done
          if [ "$found" -eq 0 ]; then
            echo "No macOS release files found in release/."
            exit 1
          fi
