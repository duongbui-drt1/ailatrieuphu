name: Release macOS

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      target:
        description: App role to build
        required: true
        default: all
        type: choice
        options:
          - all
          - host
          - client
          - viewer
  push:
    tags:
      - "macos_v*"

jobs:
  init-release:
    name: Prepare macOS GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/macos_v')
    steps:
      - name: Create release shell
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          release_flags=()
          case "${GITHUB_REF_NAME}" in
            *alpha*|*Alpha*|*ALPHA*|*beta*|*Beta*|*BETA*|*rc*|*RC*|*pre*|*Pre*|*PRE*)
              release_flags+=(--prerelease)
              ;;
          esac
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --title "Ai La Trieu Phu macOS ${GITHUB_REF_NAME}" \
              --notes "macOS 14 unsigned drag-to-Applications DMG downloads for Apple Silicon (arm64) and Intel. Right-click and Open may be required on first launch." \
              "${release_flags[@]}"

  build:
    name: macOS ${{ matrix.arch }} dmg
    needs: init-release
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.init-release.result == 'success') }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: intel
            runner: macos-15-intel
    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS apps
        shell: bash
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ -z "$TARGET" ]; then TARGET="all"; fi
          sw_vers
          uname -m
          echo "MACOSX_DEPLOYMENT_TARGET=${MACOSX_DEPLOYMENT_TARGET}"
          VERSION="${GITHUB_REF_NAME#macos_v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then VERSION="1.0.0"; fi
          python3 -m pip install -r requirements.txt
          python3 -m pip install -r requirements-build.txt
          python3 packaging/build_apps.py --target "$TARGET" --version "$VERSION"

      - name: Pack macOS role DMGs and selector
        shell: bash
        run: |
          mkdir -p release
          VERSION="${GITHUB_REF_NAME#macos_v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then VERSION="1.0.0"; fi

          TARGET="${{ github.event.inputs.target }}"
          if [ -z "$TARGET" ]; then TARGET="all"; fi

          pack_role() {
            role="$1"
            output="$2"
            display="$3"
            if [ "$TARGET" != "all" ] && [ "$TARGET" != "$role" ]; then
              return 0
            fi

            app="dist/${output}.app"
            if [ ! -d "$app" ]; then
              echo "Missing macOS app bundle: $app"
              return 1
            fi

            dmg_root="$(mktemp -d)"
            cp -R "$app" "${dmg_root}/${display}.app"
            ln -s /Applications "${dmg_root}/Applications"
            dmg="release/AiLaTrieuPhu-macOS-${role}-${{ matrix.arch }}-macos14.dmg"
            hdiutil create \
              -volname "$display" \
              -srcfolder "$dmg_root" \
              -ov \
              -format UDZO \
              "$dmg"
            rm -rf "$dmg_root"
          }

          pack_role "host" "AiLaTrieuPhu-Host" "Ai Là Triệu Phú (Host)"
          pack_role "client" "AiLaTrieuPhu-Client" "Ai Là Triệu Phú (Người Chơi)"
          pack_role "viewer" "AiLaTrieuPhu-Viewer" "Ai Là Triệu Phú (Khán Giả)"

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            selector_dir="release/dmg-selector-macos"
            mkdir -p "$selector_dir"
            sed \
              -e "s#__REPO__#${{ github.repository }}#g" \
              -e "s#__TAG__#${GITHUB_REF_NAME}#g" \
              packaging/installers/macos/Install-AiLaTrieuPhu.command.in > "$selector_dir/Install-AiLaTrieuPhu.command"
            chmod +x "$selector_dir/Install-AiLaTrieuPhu.command"
            (cd "$selector_dir" && zip -r "../AiLaTrieuPhu-macOS-DMG-Selector-${GITHUB_REF_NAME}.zip" .)
          fi

          found=0
          for item in release/*; do
            if [ -f "$item" ]; then
              found=1
              ls -lh "$item"
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "No release files were created."
            exit 1
          fi

      - name: Publish macOS files to release
        if: startsWith(github.ref, 'refs/tags/macos_v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          found=0
          for asset in release/*; do
            if [ ! -f "$asset" ]; then
              continue
            fi
            found=1
            ls -lh "$asset"
            gh release upload "${GITHUB_REF_NAME}" "$asset" --clobber
          done
          if [ "$found" -eq 0 ]; then
            echo "No macOS release files found in release/."
            exit 1
          fi
