name: Build desktop apps

on:
  workflow_dispatch:
    inputs:
      target:
        description: App role to build
        required: true
        default: all
        type: choice
        options:
          - all
          - host
          - client
          - viewer
  push:
    tags:
      - "v*"

jobs:
  windows:
    name: Windows exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows apps
        shell: pwsh
        run: |
          $Target = "${{ github.event.inputs.target }}"
          if (-not $Target) { $Target = "all" }
          .\packaging\build_windows.ps1 -Target $Target

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiLaTrieuPhu-Windows
          path: dist/

  macos:
    name: macOS app and pkg
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS apps
        shell: bash
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ -z "$TARGET" ]; then TARGET="all"; fi
          bash packaging/build_macos.sh "$TARGET"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiLaTrieuPhu-macOS
          path: dist/
