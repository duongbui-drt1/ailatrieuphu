name: Release Windows

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      target:
        description: App role to build
        required: true
        default: all
        type: choice
        options:
          - all
          - host
          - client
          - viewer
  push:
    tags:
      - "windows_v*"

jobs:
  build:
    name: Windows desktop zip
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows apps
        shell: pwsh
        run: |
          $Target = "${{ github.event.inputs.target }}"
          if (-not $Target) { $Target = "all" }
          .\packaging\build_windows.ps1 -Target $Target

      - name: Pack Windows release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $Tag = "${{ github.ref_name }}"
          if (-not $Tag) { $Tag = "manual" }
          $ZipPath = "release\AiLaTrieuPhu-Windows-$Tag.zip"
          Compress-Archive -Path "dist\*" -DestinationPath $ZipPath -Force
          Get-ChildItem release | Format-Table Name, Length

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiLaTrieuPhu-Windows
          path: release/*.zip

  release:
    name: Windows GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/windows_v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create Windows GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t zips < <(find release-assets -type f -name "*.zip")
          printf '%s\n' "${zips[@]}"
          gh release create "${GITHUB_REF_NAME}" "${zips[@]}" \
            --title "Ai La Trieu Phu Windows ${GITHUB_REF_NAME}" \
            --notes "Windows unsigned desktop build. This release includes the branded app icon."
