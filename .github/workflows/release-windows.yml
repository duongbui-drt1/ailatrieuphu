name: Release Windows

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      target:
        description: App role to build
        required: true
        default: all
        type: choice
        options:
          - all
          - host
          - client
          - viewer
  push:
    tags:
      - "windows_v*"

jobs:
  build:
    name: Windows desktop zip
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows apps
        shell: pwsh
        run: |
          $Target = "${{ github.event.inputs.target }}"
          if (-not $Target) { $Target = "all" }
          .\packaging\build_windows.ps1 -Target $Target

      - name: Pack Windows release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $Tag = "${{ github.ref_name }}"
          if (-not $Tag) { $Tag = "manual" }
          $ZipPath = "release\AiLaTrieuPhu-Windows-$Tag.zip"
          Compress-Archive -Path "dist\*" -DestinationPath $ZipPath -Force
          Get-ChildItem release | Format-Table Name, Length

      - name: Publish Windows release
        if: startsWith(github.ref, 'refs/tags/windows_v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          $Tag = "${{ github.ref_name }}"
          $Zip = Get-ChildItem release -Filter *.zip | Select-Object -First 1
          if (-not $Zip) {
            throw "No Windows release zip found."
          }

          $ReleaseExists = $true
          gh release view $Tag *> $null
          if ($LASTEXITCODE -ne 0) {
            $ReleaseExists = $false
          }

          if (-not $ReleaseExists) {
            gh release create $Tag $Zip.FullName `
              --title "Ai La Trieu Phu Windows $Tag" `
              --notes "Windows unsigned desktop build. This release includes the branded app icon."
          } else {
            gh release upload $Tag $Zip.FullName --clobber
          }

          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release publish failed."
          }
