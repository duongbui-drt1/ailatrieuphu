name: Release Windows

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      target:
        description: App role to build
        required: true
        default: all
        type: choice
        options:
          - all
          - host
          - client
          - viewer
  push:
    tags:
      - "windows_v*"

jobs:
  build:
    name: Windows desktop zip
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows apps
        shell: pwsh
        run: |
          $Target = "${{ github.event.inputs.target }}"
          if (-not $Target) { $Target = "all" }
          $env:AILTP_PYTHON = (Get-Command python).Source
          $env:PYTHONUTF8 = "1"
          $env:PYTHONIOENCODING = "utf-8"
          .\packaging\build_windows.ps1 -Target $Target

      - name: Pack Windows role zips and installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $Tag = "${{ github.ref_name }}"
          if (-not $Tag) { $Tag = "manual" }

          $Target = "${{ github.event.inputs.target }}"
          if (-not $Target) { $Target = "all" }
          $Roles = @(
            @{ Key = "host"; Display = "Ai Là Triệu Phú (Host)"; Output = "AiLaTrieuPhu-Host" },
            @{ Key = "client"; Display = "Ai Là Triệu Phú (Người Chơi)"; Output = "AiLaTrieuPhu-Client" },
            @{ Key = "viewer"; Display = "Ai Là Triệu Phú (Khán Giả)"; Output = "AiLaTrieuPhu-Viewer" }
          )

          Write-Host "Dist outputs:"
          Get-ChildItem dist | Format-Table Name, Length

          $Missing = @()
          foreach ($Role in $Roles) {
            if ($Target -ne "all" -and $Target -ne $Role.Key) {
              continue
            }
            $AppDir = Join-Path "dist" $Role.Output
            $AppExe = Join-Path "dist" "$($Role.Output).exe"
            $ZipPath = "release\AiLaTrieuPhu-Windows-$($Role.Key)-$Tag.zip"
            if (Test-Path $AppDir) {
              Compress-Archive -Path $AppDir -DestinationPath $ZipPath -Force
            } elseif (Test-Path $AppExe) {
              Compress-Archive -Path $AppExe -DestinationPath $ZipPath -Force
            } else {
              $Missing += "$($Role.Key) -> $($Role.Output)"
            }
          }

          if ($Missing.Count -gt 0) {
            throw "Missing Windows app output: $($Missing -join ', ')"
          }

          $InstallerDir = "release\installer-windows"
          New-Item -ItemType Directory -Force -Path $InstallerDir | Out-Null
          $Installer = Get-Content "packaging\installers\windows\Install-AiLaTrieuPhu.ps1.in" -Raw
          $Installer = $Installer.Replace("__REPO__", "${{ github.repository }}").Replace("__TAG__", $Tag)
          $Utf8Bom = New-Object System.Text.UTF8Encoding $true
          [System.IO.File]::WriteAllText((Join-Path $InstallerDir "Install-AiLaTrieuPhu.ps1"), $Installer, $Utf8Bom)
          Copy-Item "packaging\installers\windows\Install-AiLaTrieuPhu.cmd" (Join-Path $InstallerDir "Install-AiLaTrieuPhu.cmd") -Force
          Compress-Archive -Path "$InstallerDir\*" -DestinationPath "release\AiLaTrieuPhu-Windows-Installer-$Tag.zip" -Force

          Get-ChildItem release | Format-Table Name, Length

      - name: Publish Windows release
        if: startsWith(github.ref, 'refs/tags/windows_v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          $Tag = "${{ github.ref_name }}"
          $Zips = @(Get-ChildItem release -Filter *.zip | Sort-Object @{ Expression = { if ($_.Name -like "*Installer*") { 1 } else { 0 } } }, Name)
          if ($Zips.Count -eq 0) {
            throw "No Windows release zip files found."
          }

          $ReleaseExists = $true
          gh release view $Tag *> $null
          if ($LASTEXITCODE -ne 0) {
            $ReleaseExists = $false
          }

          if (-not $ReleaseExists) {
            gh release create $Tag `
              --title "Ai La Trieu Phu Windows $Tag" `
              --notes "Windows unsigned desktop installer and role-specific downloads."
          }

          $RoleZipNames = @(
            "AiLaTrieuPhu-Windows-host-$Tag.zip",
            "AiLaTrieuPhu-Windows-client-$Tag.zip",
            "AiLaTrieuPhu-Windows-viewer-$Tag.zip"
          )
          $InstallerZipName = "AiLaTrieuPhu-Windows-Installer-$Tag.zip"

          foreach ($Name in $RoleZipNames + @($InstallerZipName)) {
            if (-not (Test-Path (Join-Path release $Name))) {
              throw "Expected release asset was not created: $Name"
            }
          }

          foreach ($Name in $RoleZipNames) {
            $Zip = Get-Item (Join-Path release $Name)
            gh release upload $Tag $Zip.FullName --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "GitHub release upload failed for $($Zip.Name)."
            }
          }

          $ReleaseInfo = gh release view $Tag --json assets | ConvertFrom-Json
          $UploadedNames = @($ReleaseInfo.assets | ForEach-Object { $_.name })
          $MissingRoleAssets = @($RoleZipNames | Where-Object { $UploadedNames -notcontains $_ })
          if ($MissingRoleAssets.Count -gt 0) {
            throw "Role assets missing after upload: $($MissingRoleAssets -join ', ')"
          }

          $InstallerZip = Get-Item (Join-Path release $InstallerZipName)
          gh release upload $Tag $InstallerZip.FullName --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release upload failed for $($InstallerZip.Name)."
          }

          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release publish failed."
          }
